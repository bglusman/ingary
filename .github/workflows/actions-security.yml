name: GitHub Actions Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install zizmor
        run: |
          python3 -m venv /tmp/zizmor-venv
          /tmp/zizmor-venv/bin/pip install zizmor==1.16.3
      - name: Audit workflows
        run: /tmp/zizmor-venv/bin/zizmor --offline --format=github .
