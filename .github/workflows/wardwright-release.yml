# Generated by tinfoil 0.2.20, then adapted for this repository's app/ subdirectory.
# If regenerating, run from app/ and preserve the root workflow path plus working-directory fixes.
name: Wardwright Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  MIX_ENV: prod
  APP_NAME: wardwright

jobs:
  build:
    name: Build ${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: darwin_arm64
            targets: "darwin_arm64"
            runner: macos-latest
          - id: darwin_x86_64
            targets: "darwin_x86_64"
            runner: macos-15-intel
          - id: linux_x86_64
            targets: "linux_x86_64"
            runner: ubuntu-latest
          - id: linux_arm64
            targets: "linux_arm64"
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93
        with:
          elixir-version: "1.19"
          otp-version: "28"
          gleam-version: "1.16.0"

      - name: Set up Zig on macOS
        if: runner.os == 'macOS'
        run: |
          brew install zig@0.15
          echo "$(brew --prefix zig@0.15)/bin" >> "$GITHUB_PATH"

      - name: Set up Zig on Linux
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: "0.15.2"
          use-cache: false

      - name: Install dependencies
        working-directory: app
        run: mix deps.get

      - name: Build and package release
        working-directory: app
        run: |
          for target in $(echo "${{ matrix.targets }}" | tr ',' ' '); do
            mix tinfoil.build --target "$target"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.id }}
          path: app/_tinfoil/*
          if-no-files-found: error

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: app/_tinfoil/*.tar.gz, app/_tinfoil/*.zip


  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93
        with:
          elixir-version: "1.19"
          otp-version: "28"
          gleam-version: "1.16.0"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Install dependencies
        working-directory: app
        run: mix deps.get

      - name: Publish GitHub Release
        working-directory: app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mix tinfoil.publish --input-dir ../artifacts

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-dev') }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93
        with:
          elixir-version: "1.19"
          otp-version: "28"
          gleam-version: "1.16.0"

      - name: Install dependencies
        working-directory: app
        run: mix deps.get

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Homebrew formula
        working-directory: app
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: mix tinfoil.homebrew --input-dir ../artifacts
