name: secret-scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.24.3
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks on PR range
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          case "$BASE_REF" in
            ""|/*|*..*|*"@{"*|*\\*|*[!A-Za-z0-9._/-]*)
              echo "Refusing unsafe base ref: $BASE_REF" >&2
              exit 1
              ;;
          esac
          auth_header="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 | tr -d '\n')"
          echo "::add-mask::${auth_header}"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch --no-tags origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          base="$(git merge-base HEAD "origin/${BASE_REF}")"
          gitleaks detect --config .gitleaks.toml --redact -v --exit-code=2 --log-opts="${base}..HEAD"
      - name: Run gitleaks on pushed commits
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            range="HEAD~1..HEAD"
          else
            range="${BEFORE_SHA}..${AFTER_SHA}"
          fi
          gitleaks detect --config .gitleaks.toml --redact -v --exit-code=2 --log-opts="$range"
      - name: Run manual gitleaks scan
        if: github.event_name == 'workflow_dispatch'
        run: gitleaks detect --config .gitleaks.toml --redact -v --exit-code=2 --log-opts="HEAD~1..HEAD"
