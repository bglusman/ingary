name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app:
    name: app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          otp-version: "29.0"
          elixir-version: "1.20.0-rc.5"
          gleam-version: "1.16.0"
      - name: Install deps
        run: mix deps.get
        working-directory: app
      - name: Check Gleam formatting
        run: gleam format --check src
        working-directory: app
      - name: Check formatting
        run: mix format --check-formatted
        working-directory: app
      - name: Run tests
        run: mix test
        working-directory: app

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Check docs links
        run: ruby scripts/check-docs-site.rb

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [app, docs]
    if: always()
    steps:
      - name: Verify required jobs
        env:
          APP_RESULT: ${{ needs.app.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
        run: |
          set -euo pipefail
          for result in "$APP_RESULT" "$DOCS_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "A required job failed or was skipped"
              exit 1
            fi
          done
