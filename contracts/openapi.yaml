openapi: 3.1.0
info:
  title: Wardwright Synthetic Model Platform API
  version: 0.1.0-draft
  description: |
    Draft contract for backend and frontend prototypes. The serving surface is
    OpenAI-compatible where possible, with additional synthetic-model,
    simulation, receipt, and admin endpoints.
servers:
  - url: http://127.0.0.1:8787
    description: Local prototype server
tags:
  - name: OpenAI Compatible
  - name: Synthetic Models
  - name: Receipts
  - name: Admin
paths:
  /v1/models:
    get:
      tags: [OpenAI Compatible]
      summary: List public synthetic models
      responses:
        "200":
          description: OpenAI-compatible model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"
  /v1/chat/completions:
    post:
      tags: [OpenAI Compatible]
      summary: Execute an OpenAI-compatible chat completion through a synthetic model
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ApplicationId"
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/RunId"
        - $ref: "#/components/parameters/ClientRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: Chat completion response or SSE stream when stream=true
          headers:
            X-Wardwright-Receipt-Id:
              schema:
                type: string
            X-Wardwright-Selected-Model:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
  /v1/synthetic/models:
    get:
      tags: [Synthetic Models]
      summary: List synthetic models with active versions
      responses:
        "200":
          description: Synthetic model summaries
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SyntheticModelSummary"
  /v1/synthetic/models/{model_id}:
    get:
      tags: [Synthetic Models]
      summary: Get a synthetic model definition
      parameters:
        - name: model_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Synthetic model definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyntheticModel"
        "404":
          $ref: "#/components/responses/Error"
  /v1/synthetic/simulate:
    post:
      tags: [Synthetic Models]
      summary: Simulate route selection without calling providers
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ApplicationId"
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationRequest"
      responses:
        "200":
          description: Route simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationResult"
        "400":
          $ref: "#/components/responses/Error"
  /v1/receipts:
    get:
      tags: [Receipts]
      summary: Search receipts
      parameters:
        - name: model
          in: query
          schema: { type: string }
        - name: consuming_agent_id
          in: query
          schema: { type: string }
        - name: consuming_user_id
          in: query
          schema: { type: string }
        - name: session_id
          in: query
          schema: { type: string }
        - name: run_id
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: tool_namespace
          in: query
          schema: { type: string }
        - name: tool_name
          in: query
          schema: { type: string }
        - name: tool_phase
          in: query
          schema: { type: string }
        - name: tool_risk_class
          in: query
          schema: { type: string }
        - name: tool_source
          in: query
          schema: { type: string }
        - name: tool_call_id
          in: query
          schema: { type: string }
        - name: tool_policy_status
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Receipt search results
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReceiptSummary"
        "403":
          $ref: "#/components/responses/ProtectedEndpoint"
  /v1/receipts/{receipt_id}:
    get:
      tags: [Receipts]
      summary: Get one receipt
      parameters:
        - name: receipt_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"
        "403":
          $ref: "#/components/responses/ProtectedEndpoint"
        "404":
          $ref: "#/components/responses/Error"
  /admin/providers:
    get:
      tags: [Admin]
      summary: List provider adapters
      responses:
        "200":
          description: Provider adapter list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Provider"
        "403":
          $ref: "#/components/responses/ProtectedEndpoint"
  /admin/storage:
    get:
      tags: [Admin]
      summary: Get storage provider health and capability metadata
      responses:
        "200":
          description: Storage health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageHealth"
        "403":
          $ref: "#/components/responses/ProtectedEndpoint"
  /admin/runtime:
    get:
      tags: [Admin]
      summary: Get supervised model and session runtime visibility state
      responses:
        "200":
          description: Runtime model/session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeStatus"
        "403":
          $ref: "#/components/responses/ProtectedEndpoint"
  /admin/synthetic-models:
    get:
      tags: [Admin]
      summary: List full synthetic model admin records
      responses:
        "200":
          description: Synthetic model records
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SyntheticModel"
        "403":
          $ref: "#/components/responses/ProtectedEndpoint"
  /admin/policy-alerts:
    get:
      tags: [Admin]
      summary: Get policy alert delivery sink health
      responses:
        "200":
          description: Policy alert delivery sink health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyAlertStatus"
        "403":
          $ref: "#/components/responses/ProtectedEndpoint"
  /__test/config:
    post:
      tags: [Admin]
      summary: Prototype-only dynamic model definition endpoint
      description: |
        Non-production endpoint used by property/fuzz tests to install generated
        synthetic model definitions into runnable prototypes. Disabled unless
        the runtime explicitly enables `allow_test_config` or
        `WARDWRIGHT_ALLOW_TEST_CONFIG=1`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestModelConfig"
      responses:
        "200":
          description: Test config accepted
          content:
            application/json:
              schema:
                type: object
                required: [status, synthetic_model]
                properties:
                  status: { type: string }
                  synthetic_model: { type: string }
                  targets:
                    type: array
                    items:
                      $ref: "#/components/schemas/TestRouteTarget"
        "404":
          description: Test config endpoint disabled
        "400":
          $ref: "#/components/responses/Error"
components:
  parameters:
    TenantId:
      name: X-Wardwright-Tenant-Id
      in: header
      schema: { type: string }
    ApplicationId:
      name: X-Wardwright-Application-Id
      in: header
      schema: { type: string }
    AgentId:
      name: X-Wardwright-Agent-Id
      in: header
      schema: { type: string }
    UserId:
      name: X-Wardwright-User-Id
      in: header
      schema: { type: string }
    SessionId:
      name: X-Wardwright-Session-Id
      in: header
      schema: { type: string }
    RunId:
      name: X-Wardwright-Run-Id
      in: header
      schema: { type: string }
    ClientRequestId:
      name: X-Client-Request-Id
      in: header
      schema: { type: string }
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ProtectedEndpoint:
      description: Protected endpoint requires localhost or admin token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ModelList:
      type: object
      required: [object, data]
      properties:
        object:
          type: string
          const: list
        data:
          type: array
          items:
            type: object
            required: [id, object]
            properties:
              id: { type: string }
              object:
                type: string
                const: model
              owned_by:
                type: string
                default: wardwright
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      additionalProperties: true
      properties:
        model:
          type: string
          description: Synthetic model ID, optionally prefixed as wardwright/{id}
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        stream:
          type: boolean
          default: false
        metadata:
          type: object
          additionalProperties: true
          description: Optional caller metadata. Header values win when trusted; metadata.tool_context is only trusted for local, prototype, or admin-token gateway paths.
    ChatMessage:
      type: object
      required: [role]
      additionalProperties: true
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool, developer]
        content:
          oneOf:
            - type: string
            - type: "null"
            - type: array
              items:
                type: object
                additionalProperties: true
        name:
          type: string
    ChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices]
      additionalProperties: true
      properties:
        id: { type: string }
        object:
          type: string
          const: chat.completion
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            additionalProperties: true
        usage:
          type: object
          additionalProperties: true
    SyntheticModelSummary:
      type: object
      required: [id, active_version, route_type, status]
      properties:
        id: { type: string }
        public_model_id: { type: string }
        active_version: { type: string }
        route_type: { type: string }
        status: { type: string }
        traffic_24h: { type: integer }
        fallback_rate: { type: number }
        stream_trigger_count_24h: { type: integer }
    SyntheticModel:
      type: object
      required: [id, active_version, route_graph]
      properties:
        id: { type: string }
        active_version: { type: string }
        description: { type: string }
        public_namespace:
          type: string
          enum: [flat, prefixed]
        route_graph:
          $ref: "#/components/schemas/RouteGraph"
        stream_policy:
          $ref: "#/components/schemas/StreamPolicy"
        prompt_transforms:
          $ref: "#/components/schemas/PromptTransforms"
        structured_output:
          $ref: "#/components/schemas/StructuredOutput"
        governance:
          type: array
          items:
            $ref: "#/components/schemas/GovernanceRule"
    RouteGraph:
      type: object
      required: [root, nodes]
      properties:
        root: { type: string }
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/RouteNode"
    RouteNode:
      type: object
      required: [id, type]
      additionalProperties: true
      properties:
        id: { type: string }
        type:
          type: string
          enum: [alias, dispatcher, cascade, alloy, guard, concrete_model]
        targets:
          type: array
          items: { type: string }
        provider_id: { type: string }
        upstream_model_id: { type: string }
        context_window: { type: integer }
    StreamPolicy:
      type: object
      properties:
        mode:
          type: string
          enum: [pass_through, buffered_horizon, semantic_boundary, full_buffer]
        buffer_tokens:
          type: integer
        rules:
          type: array
          items:
            type: object
            additionalProperties: true
    PromptTransforms:
      type: object
      description: Engine-neutral request transformations applied before route/provider execution.
      properties:
        preamble:
          type: string
          description: Optional system/developer instruction inserted before caller messages.
        postscript:
          type: string
          description: Optional system/developer instruction appended after caller messages.
    StructuredOutput:
      type: object
      description: Declarative structured-output governance intent. Implementations may enforce with native validators, policy VM code, or sidecar engines.
      properties:
        mode:
          type: string
          enum: [json_object, json_schema, xml, protobuf_json, custom]
        schema:
          type: object
          additionalProperties: true
        repair_tries:
          type: integer
          minimum: 0
    GovernanceRule:
      type: object
      description: Engine-neutral policy rule descriptor. The public contract does not expose or require a specific policy language.
      required: [id, kind, action]
      additionalProperties: true
      properties:
        id: { type: string }
        kind:
          type: string
          enum: [request_guard, request_transform, route_gate, stream_guard, structured_output, receipt_annotation, history_threshold, history_regex_threshold, tool_selector, tool_loop_threshold, tool_sequence, custom]
        action:
          type: string
          enum: [pass, transform, validate_or_block, inject_reminder_and_retry, restrict_routes, switch_model, reroute, escalate, alert_async, block, block_final, annotate, state_transition]
        engine:
          type: string
          description: Optional implementation hint, such as builtin, starlark, dune, wasm, or sidecar. Not required for portable configs.
        contains:
          type: string
          description: Built-in prototype matcher. Matches request text case-insensitively.
        message:
          type: string
          description: Human-readable explanation recorded in policy actions and alert events.
        severity:
          type: string
          enum: [info, warning, critical]
        reminder:
          type: string
          description: Message inserted by transform/inject_reminder_and_retry actions.
    SimulationRequest:
      type: object
      required: [request]
      properties:
        model:
          type: string
          description: Optional override. Defaults to request.model.
        request:
          $ref: "#/components/schemas/ChatCompletionRequest"
    SimulationResult:
      type: object
      required: [receipt]
      properties:
        receipt:
          $ref: "#/components/schemas/Receipt"
    CallerContext:
      type: object
      properties:
        tenant_id:
          $ref: "#/components/schemas/SourcedString"
        application_id:
          $ref: "#/components/schemas/SourcedString"
        consuming_agent_id:
          $ref: "#/components/schemas/SourcedString"
        consuming_user_id:
          $ref: "#/components/schemas/SourcedString"
        session_id:
          $ref: "#/components/schemas/SourcedString"
        run_id:
          $ref: "#/components/schemas/SourcedString"
        tags:
          type: array
          items: { type: string }
    SourcedString:
      type: object
      required: [value, source]
      properties:
        value: { type: string }
        source:
          type: string
          enum: [trusted_auth, header, body_metadata, provider_key, derived_anonymous]
    ReceiptSummary:
      type: object
      required: [receipt_id, synthetic_model, synthetic_version, status, caller]
      properties:
        receipt_id: { type: string }
        synthetic_model: { type: string }
        synthetic_version: { type: string }
        selected_model: { type: string }
        status: { type: string }
        stream_trigger_count: { type: integer }
        tool_namespace: { type: string }
        tool_name: { type: string }
        tool_phase: { type: string }
        tool_risk_class: { type: string }
        tool_source: { type: string }
        tool_call_id: { type: string }
        tool_policy_status: { type: string }
        caller:
          $ref: "#/components/schemas/CallerContext"
    Receipt:
      type: object
      required: [receipt_schema, receipt_id, synthetic_model, synthetic_version, caller, decision, attempts, final]
      properties:
        receipt_schema:
          type: string
          const: v1
        receipt_id: { type: string }
        run_id: { type: string }
        synthetic_model: { type: string }
        synthetic_version: { type: string }
        caller:
          $ref: "#/components/schemas/CallerContext"
        request:
          type: object
          additionalProperties: true
        decision:
          type: object
          additionalProperties: true
        attempts:
          type: array
          items:
            type: object
            additionalProperties: true
        final:
          type: object
          additionalProperties: true
    Provider:
      type: object
      required: [id, kind, base_url, credential_owner]
      properties:
        id: { type: string }
        kind:
          type: string
          enum: [openai_compatible, litellm, helicone, openrouter, portkey, ollama, mock]
        base_url: { type: string }
        credential_owner:
          type: string
          enum: [provider, wardwright]
        health: { type: string }
    StorageHealth:
      type: object
      required: [kind, contract_version, migration_version, read_health, write_health, capabilities]
      properties:
        kind:
          type: string
          enum: [memory, json-file, sqlite, postgres, duckdb]
        contract_version: { type: string }
        migration_version: { type: integer }
        read_health: { type: string }
        write_health: { type: string }
        capabilities:
          type: object
          additionalProperties: true
    RuntimeStatus:
      type: object
      required: [models, sessions]
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeModelStatus"
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeSessionStatus"
    RuntimeModelStatus:
      type: object
      required: [model_id, version, pid, started_at]
      properties:
        model_id: { type: string }
        version: { type: string }
        pid: { type: string }
        started_at: { type: integer }
    RuntimeSessionStatus:
      type: object
      required: [model_id, version, session_id, pid, started_at, event_count]
      properties:
        model_id: { type: string }
        version: { type: string }
        session_id: { type: string }
        pid: { type: string }
        started_at: { type: integer }
        event_count: { type: integer }
        last_event:
          type: object
          additionalProperties: true
    PolicyAlertStatus:
      type: object
      required: [kind, capacity, on_full, queue_depth]
      properties:
        kind:
          type: string
          const: in_memory_alert_sink
        capacity:
          type: integer
          minimum: 0
        on_full:
          type: string
          enum: [drop, dead_letter, fail_closed]
        queue_depth:
          type: integer
          minimum: 0
        seen_count:
          type: integer
          minimum: 0
        queued_count:
          type: integer
          minimum: 0
        dead_letter_count:
          type: integer
          minimum: 0
        dropped_count:
          type: integer
          minimum: 0
        failed_closed_count:
          type: integer
          minimum: 0
        duplicate_suppressed_count:
          type: integer
          minimum: 0
        last_result:
          type:
            - object
            - "null"
          additionalProperties: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, type]
          properties:
            message: { type: string }
            type: { type: string }
            code: { type: string }
    TestModelConfig:
      type: object
      required: [synthetic_model, targets]
      properties:
        synthetic_model:
          type: string
          description: Unprefixed synthetic model ID.
        version:
          type: string
        targets:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/TestRouteTarget"
        stream_rules:
          type: array
          items:
            type: object
            required: [id, pattern, action]
            properties:
              id: { type: string }
              pattern: { type: string }
              action:
                type: string
                enum: [pass, block_final, inject_reminder_and_retry, escalate]
        prompt_transforms:
          $ref: "#/components/schemas/PromptTransforms"
        structured_output:
          $ref: "#/components/schemas/StructuredOutput"
        governance:
          type: array
          items:
            $ref: "#/components/schemas/GovernanceRule"
    TestRouteTarget:
      type: object
      required: [model, context_window]
      properties:
        model: { type: string }
        context_window:
          type: integer
          minimum: 1
        provider_kind:
          type: string
          enum: [mock, ollama, openai_compatible]
        provider_base_url:
          type: string
