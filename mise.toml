[tools]
erlang = "28.5"
elixir = "1.19.5-otp-28"

[tasks."check:app"]
description = "Run app formatting and tests"
run = "cd app && mix format --check-formatted && mix test"

[tasks."check:contracts"]
description = "Run shared Python contract/storage checks that do not need live servers"
run = "uv run python -m py_compile tests/*.py && uv run python tests/storage_contract.py --store all --cases 50"

[tasks.check]
description = "Run all baseline checks"
depends = ["check:app", "check:contracts"]

[tasks."mutation:app"]
description = "Run a bounded Muex mutation sample for the Wardwright app"
run = "cd app && MIX_ENV=test mix muex --max-mutations 30 --fail-at 0"

[tasks."run:app"]
description = "Run app on 127.0.0.1:8791"
env = { WARDWRIGHT_BIND = "127.0.0.1:8791", WARDWRIGHT_ALLOW_TEST_CREDENTIALS = "1" }
run = "cd app && mix run --no-halt"

[tasks."probe:app"]
description = "Probe the app contract"
run = "python3 tests/contract_probe.py --base-url http://127.0.0.1:8791 --fuzz-runs 10"

[tasks."config:app:local"]
description = "Load ignored local provider targets into the app"
run = "curl -fsS -X POST http://127.0.0.1:8791/__test/config -H 'Content-Type: application/json' --data-binary @.wardwright.local/provider-targets.json"
