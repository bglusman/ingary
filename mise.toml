[tools]
erlang = "29.0"
elixir = "1.20.0-rc.5-otp-29"
gleam = "1.16.0"

[tasks."check:app"]
description = "Run app formatting and tests"
run = "cd app && mix clean && gleam format --check src && mix format --check-formatted && mix test && WARDWRIGHT_POLICY_CORE=compare mix test --trace test/gleam_policy_core_test.exs"

[tasks."check:docs"]
description = "Check docs site links and front matter"
run = "ruby scripts/check-docs-site.rb"

[tasks."check:maps"]
description = "Ensure string-keyed Elixir map access does not grow in core modules"
run = "ruby scripts/check-elixir-map-boundaries.rb"

[tasks.check]
description = "Run all baseline checks"
depends = ["check:app", "check:docs", "check:maps"]

[tasks."mutation:app"]
description = "Run a bounded Muex mutation sample for the Wardwright app"
run = "cd app && MIX_ENV=test mix muex --max-mutations 30 --fail-at 0 && mix clean"

[tasks."mutation:policy"]
description = "Run focused Muex checks for policy-critical Wardwright modules; do not run concurrently with mix test"
run = [
  "cd app && MIX_ENV=test mix muex --files 'lib/wardwright/policy/structured_output.ex' --test-paths 'test/structured_output_policy_test.exs,test/bakeoff_oracle_property_test.exs' --fail-at 100",
  "cd app && MIX_ENV=test mix muex --files 'lib/wardwright/policy/stream.ex' --test-paths 'test/stream_policy_window_test.exs,test/stream_policy_horizon_test.exs,test/stream_retry_policy_test.exs,test/stream_runtime_guard_test.exs,test/stream_provider_transport_test.exs,test/stream_retry_budget_test.exs' --fail-at 100",
  "cd app && MIX_ENV=test mix muex --files 'lib/wardwright/policy_cache.ex' --test-paths 'test/policy_cache_test.exs,test/history_policy_test.exs,test/bakeoff_oracle_property_test.exs' --fail-at 100",
  "cd app && MIX_ENV=test mix muex --files 'lib/wardwright/route_planner.ex' --test-paths 'test/route_planner_test.exs,test/route_policy_test.exs' --fail-at 100",
  "cd app && MIX_ENV=test mix muex --files 'lib/wardwright/router.ex' --test-paths 'test/request_policy_test.exs,test/route_policy_test.exs,test/hybrid_policy_engine_test.exs,test/structured_output_policy_test.exs,test/history_policy_test.exs,test/alert_delivery_policy_test.exs,test/stream_policy_window_test.exs,test/stream_policy_horizon_test.exs,test/stream_retry_policy_test.exs,test/stream_runtime_guard_test.exs,test/stream_provider_transport_test.exs,test/stream_retry_budget_test.exs,test/public_api_test.exs,test/storage_and_admin_test.exs,test/runtime_visibility_test.exs' --max-mutations 40 --fail-at 100",
  "cd app && mix clean",
]

[tasks."run:app"]
description = "Run app on 127.0.0.1:8791"
env = { WARDWRIGHT_BIND = "127.0.0.1:8791", WARDWRIGHT_ALLOW_TEST_CREDENTIALS = "1" }
run = "cd app && mix run --no-halt"

[tasks."config:app:local"]
description = "Load ignored local provider targets into the app"
run = "curl -fsS -X POST http://127.0.0.1:8791/__test/config -H 'Content-Type: application/json' --data-binary @.wardwright.local/provider-targets.json"
