# Sketch only. This is not validated against a pinned TensorZero release.
# It shows how Ingary's demo synthetic model could be represented using
# TensorZero functions, variants, and OpenAI-compatible providers.

[gateway]
bind_address = "0.0.0.0:3000"
observability.enabled = false
disable_pseudonymous_usage_analytics = true

[models.local_qwen_coder]
routing = ["local_openai_compatible"]

[models.local_qwen_coder.providers.local_openai_compatible]
type = "openai"
api_base = "http://host.docker.internal:11434/v1"
model_name = "qwen-coder"
api_key_location = "none"

[models.managed_kimi_k2_6]
routing = ["managed_gateway"]

[models.managed_kimi_k2_6.providers.managed_gateway]
type = "openai"
api_base = "https://gateway.example.invalid/v1"
model_name = "kimi-k2.6"
api_key_location = "env::INGARY_MANAGED_GATEWAY_API_KEY"

[functions.ingary_coding_balanced]
type = "chat"
description = "Sketch of Ingary public synthetic model ingary/coding-balanced."

[functions.ingary_coding_balanced.variants.local_qwen_coder]
type = "chat_completion"
model = "local_qwen_coder"

[functions.ingary_coding_balanced.variants.managed_kimi_k2_6]
type = "chat_completion"
model = "managed_kimi_k2_6"

