<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<style>
:root {
  --bg: #f7f5ef;
  --ink: #171717;
  --muted: #5f625a;
  --line: #ded9cc;
  --accent: #3f6f5f;
  --accent-strong: #234b40;
  --code-bg: #ece7db;
  --code-dark: #17211e;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.62;
}
header {
  max-width: 920px;
  margin: 0 auto;
  padding: 1rem 1.25rem 0;
}
nav {
  display: flex;
  flex-wrap: wrap;
  gap: 0.9rem;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--line);
  padding-bottom: 0.8rem;
}
.brand {
  color: var(--ink);
  font-weight: 800;
  text-decoration: none;
}
.nav-links {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
}
main {
  max-width: 920px;
  margin: 0 auto;
  padding: 3rem 1.25rem 4rem;
}
h1 {
  font-size: clamp(2.25rem, 6vw, 4.75rem);
  line-height: 0.98;
  margin: 0 0 1rem;
  letter-spacing: 0;
}
h2 {
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--line);
  font-size: 1.35rem;
}
h3 { margin-top: 1.8rem; }
p, li { color: var(--muted); }
a { color: var(--accent-strong); text-decoration-thickness: 0.08em; text-underline-offset: 0.18em; }
strong { color: var(--ink); }
code {
  background: var(--code-bg);
  color: var(--ink);
  border-radius: 4px;
  padding: 0.1rem 0.35rem;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.92em;
}
pre {
  background: var(--code-dark);
  color: #f4f1e8;
  padding: 1rem 1.2rem;
  border-radius: 8px;
  overflow-x: auto;
}
pre code { background: transparent; color: inherit; padding: 0; }
.hero {
  min-height: 70vh;
  display: grid;
  align-content: center;
  padding-bottom: 4rem;
}
.eyebrow {
  color: var(--accent-strong);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.78rem;
}
.lede {
  max-width: 760px;
  font-size: 1.2rem;
  color: var(--muted);
}
.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  margin-top: 1.8rem;
}
.button {
  display: inline-flex;
  align-items: center;
  min-height: 2.75rem;
  padding: 0.65rem 0.95rem;
  border: 1px solid var(--accent);
  border-radius: 6px;
  background: var(--accent);
  color: #fff;
  text-decoration: none;
  font-weight: 700;
}
.button.secondary {
  background: transparent;
  color: var(--accent-strong);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 1rem;
}
.card {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 1rem;
  background: rgba(255,255,255,0.34);
}
.card p { margin-bottom: 0; }
.notice {
  border-left: 4px solid var(--accent);
  background: rgba(255,255,255,0.45);
  padding: 0.9rem 1rem;
  margin: 1.5rem 0;
}
.flow {
  display: grid;
  gap: 0.65rem;
  margin: 1.2rem 0;
}
.flow-step {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0.8rem 1rem;
  background: rgba(255,255,255,0.34);
}
footer {
  border-top: 1px solid var(--line);
  margin-top: 4rem;
  padding-top: 1.25rem;
  color: var(--muted);
  font-size: 0.9rem;
}
</style>
</head>
<body>
<header>
  <nav aria-label="Primary">
    <a class="brand" href="{{ '/' | relative_url }}">Ingary</a>
    <div class="nav-links">
      <a href="{{ '/vision.html' | relative_url }}">Vision</a>
      <a href="{{ '/use-cases.html' | relative_url }}">Use Cases</a>
      <a href="{{ '/feature-spikes.html' | relative_url }}">Feature Spikes</a>
      <a href="{{ '/policy-engine.html' | relative_url }}">Policy Engine</a>
      <a href="{{ '/governance-authoring.html' | relative_url }}">Authoring</a>
      <a href="https://github.com/bglusman/ingary">GitHub</a>
    </div>
  </nav>
</header>
<main>
{{ content }}
<footer>
  <p>Apache-2.0. Ingary is experimental and under active design.</p>
</footer>
</main>
<script data-goatcounter="https://stats.ingary.org/count"
        async src="https://stats.ingary.org/count.js"></script>
</body>
</html>
